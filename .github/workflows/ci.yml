name: CI

on:
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Detekt and Android Lint
        run: ./gradlew :app:detekt :app:lintDebug

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            app/build/reports/detekt/**
            app/build/reports/lint-results-*
            app/build/intermediates/lint_intermediate_text_report/**
          if-no-files-found: warn

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests and coverage
        run: ./gradlew :app:testDebugUnitTest :app:koverHtmlReportDebug :app:koverVerifyDebug

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/test-results/testDebugUnitTest/**
            app/build/reports/tests/testDebugUnitTest/**
            app/build/reports/kover/**
          if-no-files-found: warn

  release-build:
    name: Release Build
    runs-on: ubuntu-latest
    needs:
      - quality
      - test
      - schema-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release
        run: ./gradlew :app:assembleRelease

      - name: Upload release outputs and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-build-artifacts
          path: |
            app/build/outputs/**
            app/build/reports/**
          if-no-files-found: warn

  schema-check:
    name: Schema Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run schema-producing tasks
        run: ./gradlew :app:assembleRelease

      - name: Verify Room schemas are committed
        run: |
          git update-index --refresh
          git diff --exit-code -- app/schemas

      - name: Upload schema snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: app/schemas/**
          if-no-files-found: warn
